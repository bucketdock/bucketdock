name: Deploy website

# Builds the static site under `website/` and deploys it to GitHub Pages.
# The site is plain HTML/CSS, so we just upload the directory as-is.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate website assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke check website files
        # Cheap structural checks so a typo in the deploy step does not push
        # a broken site live.
        run: |
          set -e
          test -f website/index.html
          test -f website/install.html
          test -f website/docs.html
          test -f website/styles.css
          test -f website/CNAME
          test -f website/assets/logo.svg
          test -f website/assets/logo.png
          # Make sure every page references the stylesheet.
          for f in website/index.html website/install.html website/docs.html; do
            grep -q 'styles.css' "$f"
          done
          echo "website/ looks ok"

  build:
    name: Build site
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
