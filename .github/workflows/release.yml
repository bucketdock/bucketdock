name: Release

# Release Please drives versioning + changelog from Conventional Commits on
# `main`. When the release PR merges and a new GitHub Release is created we
# build the macOS desktop app and attach the .dmg/.app bundles to it.
#
# Smoke tests must pass before any build artifact is produced.
# Apple signing / notarization is optional for now. When no Apple credentials
# are configured we still publish the unsigned developer-preview build.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    uses: ./.github/workflows/smoke.yml

  release-please:
    name: Release Please
    needs: smoke
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Inspect optional Apple signing configuration
        id: apple-config
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          require_all() {
            local group_name="$1"
            shift
            local missing=()

            for name in "$@"; do
              if [ -z "${!name:-}" ]; then
                missing+=("$name")
              fi
            done

            if [ "${#missing[@]}" -gt 0 ]; then
              printf 'Partial %s configuration. Missing: %s\n' "$group_name" "${missing[*]}" >&2
              exit 1
            fi
          }

          any_present() {
            for name in "$@"; do
              if [ -n "${!name:-}" ]; then
                return 0
              fi
            done

            return 1
          }

          signing_present=false
          api_present=false
          apple_id_present=false

          if any_present APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY; then
            signing_present=true
            require_all 'Apple signing' APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY
          fi

          if any_present APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_P8; then
            api_present=true
            require_all 'App Store Connect notarization' APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_P8
          fi

          if any_present APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; then
            apple_id_present=true
          fi
          if [ "$apple_id_present" = true ]; then
            require_all 'Apple ID notarization' APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          fi

          if [ "$signing_present" = false ] && { [ "$api_present" = true ] || [ "$apple_id_present" = true ]; }; then
            echo 'Notarization credentials were provided without Apple signing credentials.' >&2
            exit 1
          fi

          if [ "$api_present" = true ] && [ "$apple_id_present" = true ]; then
            echo 'Configure only one notarization method in GitHub secrets: App Store Connect API or Apple ID.' >&2
            exit 1
          fi

          if [ "$signing_present" = false ]; then
            echo 'signing_mode=developer-preview' >> "$GITHUB_OUTPUT"
            echo 'notary_mode=none' >> "$GITHUB_OUTPUT"
            {
              echo '### macOS release mode'
              echo
              echo 'Publishing unsigned developer-preview artifacts. Apple signing secrets are not configured.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$api_present" = true ]; then
            echo 'signing_mode=developer-id' >> "$GITHUB_OUTPUT"
            echo 'notary_mode=api' >> "$GITHUB_OUTPUT"
          else
            echo 'signing_mode=developer-id' >> "$GITHUB_OUTPUT"
            if [ "$apple_id_present" = true ]; then
              echo 'notary_mode=apple-id' >> "$GITHUB_OUTPUT"
            else
              echo 'notary_mode=none' >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Write App Store Connect API key
        if: steps.apple-config.outputs.notary_mode == 'api'
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build BucketDock
        env:
          SIGNING_MODE: ${{ steps.apple-config.outputs.signing_mode }}
          NOTARY_MODE: ${{ steps.apple-config.outputs.notary_mode }}
          SECRET_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          SECRET_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SECRET_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SECRET_APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          SECRET_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          SECRET_APPLE_ID: ${{ secrets.APPLE_ID }}
          SECRET_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          SECRET_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "$SIGNING_MODE" = 'developer-id' ]; then
            export APPLE_CERTIFICATE="$SECRET_APPLE_CERTIFICATE"
            export APPLE_CERTIFICATE_PASSWORD="$SECRET_APPLE_CERTIFICATE_PASSWORD"
            export APPLE_SIGNING_IDENTITY="$SECRET_APPLE_SIGNING_IDENTITY"

            if [ "$NOTARY_MODE" = 'api' ]; then
              export APPLE_API_ISSUER="$SECRET_APPLE_API_ISSUER"
              export APPLE_API_KEY="$SECRET_APPLE_API_KEY"
            elif [ "$NOTARY_MODE" = 'apple-id' ]; then
              export APPLE_ID="$SECRET_APPLE_ID"
              export APPLE_PASSWORD="$SECRET_APPLE_PASSWORD"
              export APPLE_TEAM_ID="$SECRET_APPLE_TEAM_ID"
            fi
          fi

          pnpm tauri build --target ${{ matrix.target }}

      - name: Validate macOS bundle
        shell: bash
        run: |
          set -euo pipefail
          app_dir=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name '*.app' | head -n1)
          dmg_path=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -name '*.dmg' | head -n1)

          if [ -z "$app_dir" ] || [ -z "$dmg_path" ]; then
            echo 'Expected signed macOS artifacts were not produced.' >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_dir"

          if [ "${{ steps.apple-config.outputs.notary_mode }}" = 'api' ] || [ "${{ steps.apple-config.outputs.notary_mode }}" = 'apple-id' ]; then
            spctl -a -t exec -vv "$app_dir"
            xcrun stapler validate "$app_dir"
            xcrun stapler validate "$dmg_path"
          else
            echo 'Skipping Gatekeeper and stapler validation for the unsigned developer-preview build.'
          fi

      - name: Collect artifacts
        run: |
          set -e
          mkdir -p dist
          # DMG
          find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name '*.dmg' -exec cp {} dist/ \;
          # .app bundle (zipped for upload)
          APP_DIR=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -maxdepth 1 -name '*.app' | head -n1)
          if [ -n "$APP_DIR" ]; then
            APP_NAME=$(basename "$APP_DIR" .app)
            (cd "$(dirname "$APP_DIR")" && zip -ry "$APP_NAME-${{ matrix.arch }}.zip" "$APP_NAME.app")
            cp "$(dirname "$APP_DIR")/$APP_NAME-${{ matrix.arch }}.zip" dist/
          fi
          ls -lah dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  annotate-release:
    name: Annotate release notes
    needs:
      - release-please
      - build-macos
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Add macOS install note to GitHub release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = `${{ needs.release-please.outputs.tag_name }}`;
            const heading = '## macOS developer-preview install note';
            const note = [
              heading,
              '',
              'Current macOS builds are unsigned developer-preview builds. After downloading, you may need to remove the app from quarantine by running:',
              '',
              '```bash',
              'xattr -dr com.apple.quarantine /Applications/BucketDock.app',
              'open /Applications/BucketDock.app',
              '```',
              '',
              'If macOS shows a Keychain access prompt, choose `Always Allow` to let BucketDock store your credentials in the macOS Keychain.',
              '',
              'Full install guide with screenshots: https://bucketdock.com/install.html'
            ].join('\n');

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag,
            });

            if ((release.body || '').includes(heading)) {
              core.info('Release note already contains the macOS install guidance.');
              return;
            }

            const nextBody = [release.body || '', note].filter(Boolean).join('\n\n');

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              body: nextBody,
            });
